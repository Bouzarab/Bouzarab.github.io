<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — OpenSEM Pro</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050816;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,58,92,0.08) 0%, transparent 70%);
      top: -150px; right: -150px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(102,126,234,0.06) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      animation-delay: -7s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 40px) scale(0.95); }
      75% { transform: translate(30px, 20px) scale(1.02); }
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 48px;
      text-decoration: none;
    }
    .logo img { height: 32px; width: 32px; filter: drop-shadow(0 0 8px rgba(255,58,92,0.4)); }
    .logo span { font-size: 20px; font-weight: 800; }
    .logo .red { color: #ff3a5c; }
    .logo .white { color: #fff; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,58,92,0.08);
      border: 1px solid rgba(255,58,92,0.15);
      color: #ff3a5c;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .badge .dot {
      width: 6px; height: 6px;
      background: #ff3a5c;
      border-radius: 50%;
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.5); }
    }
    h1 {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    h1 .gradient {
      background: linear-gradient(135deg, #ff3a5c 0%, #ff6b85 50%, #ff8fa3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 17px;
      color: #8a8fb5;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .notify-form {
      display: flex;
      gap: 10px;
      max-width: 420px;
      margin: 0 auto 32px;
    }
    .notify-form input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }
    .notify-form input::placeholder { color: #5a5f82; }
    .notify-form input:focus { border-color: rgba(255,58,92,0.4); }
    .notify-form button {
      padding: 14px 24px;
      border-radius: 12px;
      background: #ff3a5c;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .notify-form button:hover {
      background: #ff6b85;
      box-shadow: 0 8px 32px rgba(255,58,92,0.3);
      transform: translateY(-2px);
    }
    .back-link {
      color: #5a5f82;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover { color: #ff3a5c; }
    .back-link svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .countdown-item {
      text-align: center;
    }
    .countdown-number {
      font-size: 36px;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #ff3a5c, #ff8fa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .countdown-label {
      font-size: 11px;
      color: #5a5f82;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-top: 6px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 30px; }
      p { font-size: 15px; }
      .notify-form { flex-direction: column; }
      .notify-form button { width: 100%; }
      .countdown { gap: 12px; }
      .countdown-number { font-size: 28px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <a href="/" class="logo">
      <img src="logo.png" alt="OpenSEM Pro">
      <span class="red">OpenSEM</span><span class="white"> Pro</span>
    </a>

    <div class="badge">
      <span class="dot"></span>
      Launching Very Soon
    </div>

    <h1>Purchasing <span class="gradient">Coming Soon</span></h1>

    <p>We're putting the finishing touches on our payment system. Leave your email and we'll notify you the moment it's live.</p>

    <form class="notify-form" id="notifyForm" onsubmit="submitNotify(event)">
      <input type="email" id="notifyEmail" placeholder="Enter your email" required>
      <button type="submit" id="notifyBtn">Notify Me</button>
    </form>
    <div id="notifySuccess" style="display:none; color:#4ade80; font-size:15px; font-weight:600; margin-bottom:32px; padding:16px 24px; background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.2); border-radius:12px;">
      ✓ You're on the list! We'll notify you when we launch.
    </div>

    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Homepage
    </a>
  </div>
  <script>
function submitNotify(e) {
  e.preventDefault();
  var email = document.getElementById('notifyEmail').value;
  var btn = document.getElementById('notifyBtn');
  var form = document.getElementById('notifyForm');
  var success = document.getElementById('notifySuccess');

  btn.textContent = 'Sending...';
  btn.disabled = true;

  var formId = '1FAIpQLSfywVP5XnOYGq3jnh4O8XUCp4K13UT6696JoXzeOm0uMNVZWA';
  var entryId = 'entry.461729822';
  var url = 'https://docs.google.com/forms/d/e/' + formId + '/formResponse?' + entryId + '=' + encodeURIComponent(email);

  fetch(url, {
    method: 'POST',
    mode: 'no-cors'
  }).then(function() {
    form.style.display = 'none';
    success.style.display = 'block';
  }).catch(function() {
    form.style.display = 'none';
    success.style.display = 'block';
  });
}
</script>
</body>
</html>
